<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Academy: Zero Delay</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
        }

        #scene {
            width: 100%; height: 100%;
            background-image: url('background.png'); 
            background-size: cover; background-position: center;
            position: relative; display: block;
            /* Камера движется очень медленно — 60 секунд */
            transition: transform 60s linear; 
            transform-origin: 75% 65%; 
        }

        .zoom-active {
            transform: scale(4);
        }

        #clock-display {
            position: absolute;
            bottom: 29.5%; right: 22.5%; width: 22%; height: 10%;    
            display: flex; justify-content: center; align-items: center;
            font-family: 'Arial Narrow', 'Impact', sans-serif; 
            color: #ff0000; font-weight: 900; font-size: 5.5vw; 
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(255, 0, 0, 1);
            transform: skewX(-10deg) rotate(-0.5deg); 
            letter-spacing: 5px; opacity: 0.95;
            text-align: center;
        }

        /* Минимальное расстояние между строками кода */
        .final-code {
            font-size: 2.2vw; 
            line-height: 0.65; /* Еще плотнее */
            letter-spacing: 1px;
        }

        .active-clock { animation: pulse 0.1s infinite alternate; }

        @keyframes pulse {
            from { opacity: 0.85; text-shadow: 0 0 12px red; }
            to { opacity: 1; text-shadow: 0 0 18px red, 0 0 3px white; }
        }

        #noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none; pointer-events: none;
            background: url('https://media.giphy.com/media/oEI9uWU0EB9LpL6SAs/giphy.gif');
            opacity: 0.3;
        }

        #boot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        #start-btn {
            padding: 20px 40px; background: transparent; color: #ff0000;
            border: 2px solid #ff0000; font-family: 'Impact', sans-serif;
            font-size: 1.5rem; cursor: pointer; text-transform: uppercase;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; justify-content: center;
            align-items: center; z-index: 9999; text-align: center;
        }

        .scary-text { 
            color: white; 
            font-family: 'Courier New', monospace; 
            font-size: 5vw; 
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="fone.mp3" type="audio/mpeg">
    </audio>

    <div id="noise-overlay"></div>

    <div id="boot-overlay">
        <button id="start-btn">ENABLE SYSTEM CLOCK</button>
    </div>

    <div id="scene">
        <div id="clock-display">
            <div id="clock-text"><span id="c1">-</span><span id="c2">-</span>:<span id="c3">-</span><span id="c4">-</span></div>
        </div>
    </div>

    <div id="overlay">
        <div id="message" class="scary-text"></div>
    </div>

    <script>
        const clockSpans = [
            document.getElementById('c1'), document.getElementById('c2'),
            document.getElementById('c3'), document.getElementById('c4')
        ];
        const clockContainer = document.getElementById('clock-display');
        const clockText = document.getElementById('clock-text');
        const audio = document.getElementById('bgMusic');
        const bootOverlay = document.getElementById('boot-overlay');
        const noise = document.getElementById('noise-overlay');
        const scene = document.getElementById('scene');
        const overlay = document.getElementById('overlay');
        const message = document.getElementById('message');
        
        let activeIndices = [];
        let isCodeTime = false;
        
        const codeDigitsHtml = "6-9-14-1-12<br>12-9-22-5";
        const codeDigitsPlain = "6-9-14-1-12 12-9-22-5";

        document.getElementById('start-btn').addEventListener('click', () => {
            noise.style.display = 'block';
            
            setTimeout(() => {
                noise.style.display = 'none';
                bootOverlay.style.display = 'none';
                audio.play();
                
                scene.classList.add('zoom-active');

                const order = [0, 2, 1, 3];
                order.forEach((pos, i) => {
                    setTimeout(() => {
                        activeIndices.push(pos);
                        if (activeIndices.length === 4) {
                            clockContainer.classList.add('active-clock');
                        }
                    }, i * 400);
                });

                // 15 сек: Код на циферблате
                setTimeout(() => {
                    isCodeTime = true;
                    clockText.classList.add('final-code');
                    clockText.innerHTML = codeDigitsHtml;
                }, 15000);

                // 17 сек: Появление черного экрана
                setTimeout(() => {
                    message.innerText = codeDigitsPlain;
                    overlay.style.display = "flex";
                    
                    // Перезагрузка ЧЕРЕЗ 3 СЕКУНДЫ ПОСЛЕ появления экрана (итого 20 сек от старта)
                    setTimeout(() => {
                        location.reload();
                    }, 3000);

                }, 17000);

            }, 500);
        });

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        setInterval(() => {
            if (isCodeTime) return;
            activeIndices.forEach(idx => {
                clockSpans[idx].innerText = chars.charAt(Math.floor(Math.random() * chars.length));
            });
        }, 120);
    </script>
</body>
</html>
